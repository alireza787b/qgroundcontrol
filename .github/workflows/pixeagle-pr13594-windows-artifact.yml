name: PixEagle PR13594 Windows Artifact

on:
  workflow_dispatch:
    inputs:
      ref:
        description: 'QGC ref to build'
        required: true
        default: 'feature/http-websocket-video-streaming'
        type: string
      build_type:
        description: 'Build type'
        required: true
        default: 'Release'
        type: choice
        options:
          - Release
          - Debug

concurrency:
  group: pixeagle-pr13594-windows-artifact-${{ inputs.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  actions: read

jobs:
  build-win64:
    name: Build PR13594 win64 AMD64
    runs-on: windows-2022
    timeout-minutes: 120

    defaults:
      run:
        shell: cmd

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - name: Checkout PR branch
        uses: actions/checkout@v6
        with:
          repository: alireza787b/qgroundcontrol
          ref: ${{ inputs.ref }}
          fetch-depth: 1

      - name: Build Setup
        id: build-setup
        uses: ./.github/actions/build-setup
        with:
          qt-host: windows
          qt-arch: win64_msvc2022_64
          build-type: ${{ inputs.build_type }}

      - name: Configure
        uses: ./.github/actions/cmake-configure
        with:
          build-dir: ${{ runner.temp }}/build
          build-type: ${{ inputs.build_type }}
          extra-args: -DQGC_ENABLE_GST_VIDEOSTREAMING=ON

      - name: Resolve GStreamer root
        id: gst-root
        shell: bash
        run: |
          python3 "${GITHUB_WORKSPACE}/.github/scripts/cmake_helper.py" cache-var \
            --build-dir "${RUNNER_TEMP}/build" \
            --name GStreamer_ROOT_DIR \
            --required \
            --output-key gst_root

      - name: Add GStreamer to PATH
        shell: bash
        run: echo "${{ steps.gst-root.outputs.gst_root }}/bin" >> "$GITHUB_PATH"

      - name: Build
        uses: ./.github/actions/cmake-build
        with:
          build-dir: ${{ runner.temp }}/build
          build-type: ${{ inputs.build_type }}

      - name: Verify executable before install
        if: inputs.build_type == 'Release'
        uses: ./.github/actions/verify-executable
        with:
          binary-path: ${{ runner.temp }}/build/${{ inputs.build_type }}/QGroundControl.exe
          type: exe
          build-dir: ${{ runner.temp }}/build

      - name: Create installer
        uses: ./.github/actions/cmake-install
        with:
          build-dir: ${{ runner.temp }}\build
          build-type: ${{ inputs.build_type }}

      - name: Install and verify installer
        if: inputs.build_type == 'Release'
        id: install-check
        shell: pwsh
        run: |
          $buildDir = "${{ runner.temp }}\build"
          $installerExe = Get-ChildItem -Path $buildDir -Filter "*installer*.exe" | Select-Object -First 1
          if (-not $installerExe) {
            Write-Error "Installer .exe not found in $buildDir"
            exit 1
          }

          $installDir = "${{ runner.temp }}\qgc-install-test"
          Write-Host "Installing $($installerExe.Name) to $installDir"
          Start-Process -FilePath $installerExe.FullName -ArgumentList "/S", "/D=$installDir" -Wait -NoNewWindow

          $binary = Join-Path $installDir "bin\QGroundControl.exe"
          if (-not (Test-Path $binary)) {
            Write-Error "QGroundControl.exe not found at $binary after install"
            Get-ChildItem -Path $installDir -Recurse | Select-Object FullName
            exit 1
          }

          $pluginDir = Join-Path $installDir "lib\gstreamer-1.0"
          if (-not (Test-Path $pluginDir)) {
            Write-Error "GStreamer plugin directory not found: $pluginDir"
            exit 1
          }

          $pluginCount = (Get-ChildItem -Path $pluginDir -Filter "*.dll" | Measure-Object).Count
          Write-Host "GStreamer plugins found: $pluginCount"
          if ($pluginCount -eq 0) {
            Write-Error "No GStreamer plugin DLLs found in $pluginDir"
            exit 1
          }

      - name: Remove build SDK from PATH for installed verification
        if: inputs.build_type == 'Release'
        shell: pwsh
        env:
          GST_ROOT: ${{ steps.gst-root.outputs.gst_root }}
        run: |
          $sdkBin = Join-Path $env:GST_ROOT "bin"
          $sanitizedPath = (($env:PATH -split ';') | Where-Object { $_ -and ($_ -ne $sdkBin) }) -join ';'
          "QGC_VERIFY_INSTALLED_PATH=$sanitizedPath" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Verify installed executable
        if: inputs.build_type == 'Release'
        uses: ./.github/actions/verify-executable
        env:
          PATH: ${{ env.QGC_VERIFY_INSTALLED_PATH }}
        with:
          binary-path: ${{ runner.temp }}\qgc-install-test\bin\QGroundControl.exe
          type: exe

      - name: Locate installer
        id: installer
        shell: pwsh
        run: |
          $buildDir = "${{ runner.temp }}\build"
          $installerExe = Get-ChildItem -Path $buildDir -Filter "*installer*.exe" | Select-Object -First 1
          if (-not $installerExe) {
            Write-Error "Installer .exe not found in $buildDir"
            exit 1
          }
          $hash = (Get-FileHash -Algorithm SHA256 -Path $installerExe.FullName).Hash.ToLowerInvariant()
          "path=$($installerExe.FullName)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "name=$($installerExe.Name)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "sha256=$hash" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "### PixEagle PR13594 Windows Artifact" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append -Encoding utf8
          "" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append -Encoding utf8
          "- Ref: `${{ inputs.ref }}`" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append -Encoding utf8
          "- Installer: `$($installerExe.Name)`" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append -Encoding utf8
          "- SHA-256: `$hash`" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append -Encoding utf8

      - name: Upload installer artifact
        uses: actions/upload-artifact@v7
        with:
          name: QGroundControl-installer-AMD64-pr13594
          path: ${{ steps.installer.outputs.path }}
          retention-days: 14
          compression-level: 0
