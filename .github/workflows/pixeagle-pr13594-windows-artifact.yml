name: PixEagle PR13594 Windows Artifact

on:
  workflow_dispatch:
    inputs:
      ref:
        description: 'Exact 40-character QGC commit SHA to build'
        required: true
        type: string
      build_type:
        description: 'Build type'
        required: true
        default: 'Release'
        type: choice
        options:
          - Release
          - Debug

concurrency:
  group: pixeagle-pr13594-windows-artifact-${{ inputs.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  actions: read

jobs:
  build-win64:
    name: Build PR13594 win64 AMD64
    runs-on: windows-2022
    timeout-minutes: 120

    defaults:
      run:
        shell: cmd

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - name: Checkout exact source commit
        uses: actions/checkout@v7
        with:
          repository: alireza787b/qgroundcontrol
          ref: ${{ inputs.ref }}
          fetch-depth: 1

      - name: Verify exact source commit
        shell: bash
        env:
          EXPECTED_SOURCE_SHA: ${{ inputs.ref }}
        run: |
          if [[ ! "$EXPECTED_SOURCE_SHA" =~ ^[0-9a-fA-F]{40}$ ]]; then
            echo "::error::ref must be an exact 40-character commit SHA"
            exit 1
          fi
          actual_source_sha="$(git rev-parse HEAD)"
          if [[ "${actual_source_sha,,}" != "${EXPECTED_SOURCE_SHA,,}" ]]; then
            echo "::error::checked out $actual_source_sha instead of $EXPECTED_SOURCE_SHA"
            exit 1
          fi
          echo "Verified exact source commit: $actual_source_sha"

      - name: Build Setup
        id: build-setup
        uses: ./.github/actions/build-setup
        with:
          qt-host: windows
          qt-arch: win64_msvc2022_64
          build-type: ${{ inputs.build_type }}

      - name: Configure
        uses: ./.github/actions/cmake-configure
        with:
          build-dir: ${{ runner.temp }}/build
          build-type: ${{ inputs.build_type }}
          extra-args: -DQGC_ENABLE_GST_VIDEOSTREAMING=ON

      - name: Resolve GStreamer root
        id: gst-root
        shell: bash
        run: |
          python3 "${GITHUB_WORKSPACE}/.github/scripts/cmake_helper.py" cache-var \
            --build-dir "${RUNNER_TEMP}/build" \
            --name GStreamer_ROOT_DIR \
            --required \
            --output-key gst_root

      - name: Add GStreamer to PATH
        shell: bash
        run: echo "${{ steps.gst-root.outputs.gst_root }}/bin" >> "$GITHUB_PATH"

      - name: Build
        uses: ./.github/actions/cmake-build
        with:
          build-dir: ${{ runner.temp }}/build
          build-type: ${{ inputs.build_type }}

      - name: Verify executable before install
        if: inputs.build_type == 'Release'
        uses: ./.github/actions/verify-executable
        with:
          binary-path: ${{ runner.temp }}/build/${{ inputs.build_type }}/QGroundControl.exe
          type: exe
          build-dir: ${{ runner.temp }}/build

      - name: Create installer
        uses: ./.github/actions/cmake-install
        with:
          build-dir: ${{ runner.temp }}\build
          build-type: ${{ inputs.build_type }}

      - name: Install and verify installer
        if: inputs.build_type == 'Release'
        id: install-check
        shell: pwsh
        run: |
          $buildDir = "${{ runner.temp }}\build"
          $installerExe = Get-ChildItem -Path $buildDir -Filter "*installer*.exe" | Select-Object -First 1
          if (-not $installerExe) {
            Write-Error "Installer .exe not found in $buildDir"
            exit 1
          }

          $installDir = "${{ runner.temp }}\qgc-install-test"
          Write-Host "Installing $($installerExe.Name) to $installDir"
          Start-Process -FilePath $installerExe.FullName -ArgumentList "/S", "/D=$installDir" -Wait -NoNewWindow

          $binary = Join-Path $installDir "bin\QGroundControl.exe"
          if (-not (Test-Path $binary)) {
            Write-Error "QGroundControl.exe not found at $binary after install"
            Get-ChildItem -Path $installDir -Recurse | Select-Object FullName
            exit 1
          }

          $pluginDir = Join-Path $installDir "lib\gstreamer-1.0"
          if (-not (Test-Path $pluginDir)) {
            Write-Error "GStreamer plugin directory not found: $pluginDir"
            exit 1
          }

          $pluginCount = (Get-ChildItem -Path $pluginDir -Filter "*.dll" | Measure-Object).Count
          Write-Host "GStreamer plugins found: $pluginCount"
          if ($pluginCount -eq 0) {
            Write-Error "No GStreamer plugin DLLs found in $pluginDir"
            exit 1
          }

      - name: Verify installed executable without build SDK
        if: inputs.build_type == 'Release'
        shell: pwsh
        env:
          GST_ROOT: ${{ steps.gst-root.outputs.gst_root }}
        run: |
          function Get-NormalizedPath([string] $PathEntry) {
            if ([string]::IsNullOrWhiteSpace($PathEntry)) {
              return $null
            }
            try {
              return [IO.Path]::GetFullPath($PathEntry).TrimEnd('\', '/')
            } catch {
              return $PathEntry.Trim().TrimEnd('\', '/')
            }
          }

          $sdkBin = Get-NormalizedPath (Join-Path $env:GST_ROOT "bin")
          $sanitizedEntries = @(
            foreach ($entry in ($env:PATH -split ';')) {
              $normalizedEntry = Get-NormalizedPath $entry
              if ($normalizedEntry -and
                  -not [string]::Equals(
                    $normalizedEntry,
                    $sdkBin,
                    [StringComparison]::OrdinalIgnoreCase
                  )) {
                $entry
              }
            }
          )
          $remainingSdkEntries = @(
            $sanitizedEntries | Where-Object {
              [string]::Equals(
                (Get-NormalizedPath $_),
                $sdkBin,
                [StringComparison]::OrdinalIgnoreCase
              )
            }
          )
          if ($remainingSdkEntries.Count -ne 0) {
            Write-Error "Build GStreamer SDK remains in installed verification PATH"
            exit 1
          }

          $env:PATH = $sanitizedEntries -join ';'
          foreach ($entry in ($env:PATH -split ';')) {
            if ([string]::IsNullOrWhiteSpace($entry)) {
              continue
            }
            $normalizedEntry = Get-NormalizedPath $entry
            if ([string]::Equals(
              $normalizedEntry,
              $sdkBin,
              [StringComparison]::OrdinalIgnoreCase
            )) {
              Write-Error "Build GStreamer SDK leaked into installed verification PATH: $entry"
              exit 1
            }
          }
          Write-Host "Installed verification PATH excludes build GStreamer SDK: $sdkBin"

          $binary = "${{ runner.temp }}\qgc-install-test\bin\QGroundControl.exe"
          if (-not (Test-Path $binary)) {
            Write-Error "QGroundControl.exe not found at $binary"
            exit 1
          }
          $workDir = Split-Path -Parent $binary
          Push-Location $workDir
          try {
            python "$env:GITHUB_WORKSPACE\.github\scripts\verify_executable.py" `
              --binary-path "$binary" `
              --type exe `
              --timeout 60
            if ($LASTEXITCODE -ne 0) {
              exit $LASTEXITCODE
            }
          } finally {
            Pop-Location
          }

      - name: Locate installer
        id: installer
        shell: pwsh
        run: |
          $buildDir = "${{ runner.temp }}\build"
          $installerExe = Get-ChildItem -Path $buildDir -Filter "*installer*.exe" | Select-Object -First 1
          if (-not $installerExe) {
            Write-Error "Installer .exe not found in $buildDir"
            exit 1
          }
          $hash = (Get-FileHash -Algorithm SHA256 -Path $installerExe.FullName).Hash.ToLowerInvariant()
          "path=$($installerExe.FullName)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "name=$($installerExe.Name)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "sha256=$hash" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          Add-Content -LiteralPath $env:GITHUB_STEP_SUMMARY -Value "### PixEagle PR13594 Windows Artifact"
          Add-Content -LiteralPath $env:GITHUB_STEP_SUMMARY -Value ""
          Add-Content -LiteralPath $env:GITHUB_STEP_SUMMARY -Value ("- Ref: {0}" -f "${{ inputs.ref }}")
          Add-Content -LiteralPath $env:GITHUB_STEP_SUMMARY -Value ("- Installer: {0}" -f $installerExe.Name)
          Add-Content -LiteralPath $env:GITHUB_STEP_SUMMARY -Value ("- SHA-256: {0}" -f $hash)

      - name: Upload installer artifact
        uses: actions/upload-artifact@v7
        with:
          name: QGroundControl-installer-AMD64-pr13594
          path: ${{ steps.installer.outputs.path }}
          retention-days: 14
          compression-level: 0
